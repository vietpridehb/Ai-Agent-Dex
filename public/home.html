<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent DEX - Trading Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a2e 100%);
            color: #e4e4e7;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        header {
            margin-bottom: 40px;
        }

        .logo {
            font-size: 40px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #00ffa3 0%, #00ff88 50%, #0099ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 14px;
            color: #9ca3af;
            letter-spacing: 2px;
        }

        .content {
            background: rgba(17, 24, 39, 0.8);
            border: 1px solid rgba(31, 41, 55, 0.5);
            border-radius: 20px;
            padding: 40px 30px;
            margin-bottom: 30px;
        }

        .description {
            font-size: 14px;
            color: #9ca3af;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .features {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
            text-align: left;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 8px;
            border: 1px solid rgba(31, 41, 55, 0.5);
            font-size: 13px;
        }

        .feature-icon {
            font-size: 18px;
        }

        .nav-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .nav-btn {
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .nav-btn-primary {
            background: linear-gradient(135deg, #00ffa3, #00ff88);
            color: #000;
        }

        .nav-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 255, 163, 0.3);
        }

        .nav-btn-secondary {
            background: rgba(31, 41, 55, 0.6);
            color: #e4e4e7;
            border: 1px solid rgba(31, 41, 55, 0.8);
        }

        .nav-btn-secondary:hover {
            background: rgba(31, 41, 55, 0.9);
            color: #00ffa3;
            border-color: rgba(0, 255, 163, 0.3);
        }

        .footer {
            font-size: 11px;
            color: #4b5563;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">🤖 AI AGENT DEX</div>
            <div class="title">Trading Platform</div>
            <div class="subtitle">Fast • Modern • Professional</div>
        </header>

        <div class="content">
            <div>
                <div style="font-size: 12px; color: #9ca3af; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px;">Choose Your Interface</div>
                
                <div class="nav-buttons">
                    <a href="/swap.html" class="nav-btn nav-btn-primary">💱 Quick Swap</a>
                    <a href="/dex.html" class="nav-btn nav-btn-secondary">📊 DEX Pro</a>
                </div>


            </div>

            <div class="footer" style="margin-top: 30px;">
                AI AGENT DEX v1.0 • Web3 Powered • 0.1% Fee per Transaction
            </div>
        </div>
    </div>
</body>
</html>
