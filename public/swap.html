<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent DEX - Professional Trading Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #0f1419 50%, #0a0e1a 100%);
            background-attachment: fixed;
            color: #e4e4e7;
            min-height: 100vh;
        }

        header {
            background: rgba(10, 14, 26, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 255, 163, 0.1);
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 40px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #00ffa3, #00ff88, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }

        .nav-tabs {
            display: flex;
            gap: 32px;
            flex: 1;
        }

        .nav-tab {
            color: #9ca3af;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            background: none;
        }

        .nav-tab:hover {
            color: #00ffa3;
            background: rgba(0, 255, 163, 0.1);
        }

        .nav-tab.active {
            color: #00ffa3;
            background: rgba(0, 255, 163, 0.15);
            border-bottom: 2px solid #00ffa3;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .wallet-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(31, 41, 55, 0.4);
            border: 1px solid rgba(0, 255, 163, 0.2);
            border-radius: 8px;
            font-size: 12px;
            color: #9ca3af;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
        }

        .status-dot.connected {
            background: #00ffa3;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .connect-btn, .disconnect-btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .connect-btn {
            background: linear-gradient(135deg, #00ffa3, #00ff88);
            color: #000;
        }

        .connect-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 255, 163, 0.3);
        }

        .disconnect-btn {
            background: rgba(248, 113, 113, 0.1);
            color: #f87171;
            border: 1px solid rgba(248, 113, 113, 0.3);
            display: none;
        }

        .disconnect-btn:hover {
            background: rgba(248, 113, 113, 0.2);
        }

        .main {
            max-width: 560px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .swap-card {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(0, 255, 163, 0.15);
            border-radius: 24px;
            padding: 24px;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 24px;
            text-align: center;
            background: linear-gradient(135deg, #00ffa3, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .token-box {
            background: rgba(31, 41, 55, 0.6);
            border: 1px solid rgba(0, 255, 163, 0.1);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .token-box:focus-within {
            background: rgba(15, 23, 42, 0.6);
            border-color: rgba(0, 255, 163, 0.3);
            box-shadow: 0 0 20px rgba(0, 255, 163, 0.1);
        }

        .token-label {
            color: #9ca3af;
            font-size: 12px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .token-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .token-select-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(31, 41, 55, 0.5);
            border: 1px solid rgba(0, 255, 163, 0.2);
            color: #e4e4e7;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .token-select-btn:hover {
            background: rgba(0, 255, 163, 0.1);
            border-color: rgba(0, 255, 163, 0.4);
        }

        .token-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #e4e4e7;
            font-size: 20px;
            font-weight: 600;
            outline: none;
            text-align: right;
        }

        .token-input::placeholder {
            color: #6b7280;
        }

        .swap-arrow-container {
            display: flex;
            justify-content: center;
            margin: -12px 0;
            z-index: 10;
            position: relative;
        }

        .swap-arrow {
            background: rgba(30, 41, 59, 0.9);
            border: 2px solid rgba(0, 255, 163, 0.2);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s ease;
        }

        .swap-arrow:hover {
            border-color: rgba(0, 255, 163, 0.6);
            transform: rotate(180deg);
        }

        .info-box {
            background: rgba(31, 41, 55, 0.4);
            border: 1px solid rgba(0, 255, 163, 0.1);
            border-radius: 12px;
            padding: 12px;
            margin-top: 16px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            font-size: 13px;
            color: #9ca3af;
        }

        .info-row:not(:last-child) {
            border-bottom: 1px solid rgba(0, 255, 163, 0.05);
        }

        .info-value {
            color: #00ffa3;
            font-weight: 600;
        }

        .swap-button {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: linear-gradient(135deg, #00ffa3, #00ff88);
            border: none;
            border-radius: 12px;
            color: #000;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .swap-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 255, 163, 0.4);
        }

        .swap-button:active {
            transform: translateY(0);
        }

        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .message.success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.5);
            color: #86efac;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #fca5a5;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
        }

        .stat-box {
            background: rgba(31, 41, 55, 0.3);
            border: 1px solid rgba(0, 255, 163, 0.1);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }

        .stat-label {
            color: #9ca3af;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .stat-value {
            color: #00ffa3;
            font-size: 20px;
            font-weight: 700;
        }

        .market-prices {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 12px;
            margin-top: 24px;
        }

        .price-card {
            background: rgba(31, 41, 55, 0.2);
            border: 1px solid rgba(0, 255, 163, 0.1);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }

        .price-symbol {
            font-size: 14px;
            font-weight: 600;
            color: #00ffa3;
            margin-bottom: 4px;
        }

        .price-value {
            font-size: 12px;
            color: #9ca3af;
        }

        /* Connect Modal */
        #connectModal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid rgba(0, 255, 163, 0.2);
            border-radius: 24px;
            padding: 40px;
            max-width: 420px;
            backdrop-filter: blur(30px);
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: transparent;
            border: none;
            color: #e4e4e7;
            font-size: 28px;
            cursor: pointer;
            line-height: 1;
        }

        .modal-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 28px;
            text-align: center;
            color: #e4e4e7;
        }

        .modal-buttons {
            display: grid;
            gap: 12px;
        }

        .modal-btn {
            padding: 16px;
            background: rgba(0, 255, 163, 0.15);
            border: 1px solid rgba(0, 255, 163, 0.3);
            border-radius: 12px;
            color: #e4e4e7;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.3s;
        }

        .modal-btn:hover {
            background: rgba(0, 255, 163, 0.25);
            border-color: rgba(0, 255, 163, 0.6);
        }

        .modal-btn:first-child {
            background: linear-gradient(135deg, rgba(0, 255, 163, 0.2), rgba(0, 255, 163, 0.1));
            border-color: rgba(0, 255, 163, 0.4);
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 16px;
            }

            .nav-tabs {
                width: 100%;
                justify-content: space-around;
                gap: 8px;
            }

            .title {
                font-size: 20px;
            }

            .swap-card {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-content">
            <div class="logo">🚀 AI Agent DEX</div>
            
            <div class="nav-tabs">
                <button class="nav-tab active">Swap</button>
                <button class="nav-tab">Limit</button>
                <button class="nav-tab">Pool</button>
                <button class="nav-tab">Buy</button>
                <button class="nav-tab">Sell</button>
            </div>

            <div class="header-right">
                <div class="wallet-status">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="walletAddress">Not Connected</span>
                </div>
                <button class="connect-btn" id="connectBtn" onclick="connectWallet()">Connect</button>
                <button class="disconnect-btn" id="disconnectBtn" onclick="disconnectWallet()">Disconnect</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="main">
        <!-- Stats -->
        <div class="stats-container">
            <div class="stat-box">
                <div class="stat-label">24h Volume</div>
                <div class="stat-value">$2.4B</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Liquidity</div>
                <div class="stat-value">$8.7B</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Pairs</div>
                <div class="stat-value">100+</div>
            </div>
        </div>

        <!-- Swap Card -->
        <div class="swap-card">
            <div class="title">Swap</div>

            <!-- From Token -->
            <div class="token-box">
                <div class="token-label">From</div>
                <div class="token-row">
                    <input type="number" class="token-input" id="fromAmount" placeholder="0.00" oninput="updateFee()">
                    <button class="token-select-btn" onclick="selectToken('from')">
                        <span id="fromToken">ETH</span>
                        <span>▼</span>
                    </button>
                </div>
                <div style="font-size: 12px; color: #6b7280; margin-top: 8px;">Balance: <span id="fromBalance">0.00</span></div>
            </div>

            <!-- Swap Arrow -->
            <div class="swap-arrow-container">
                <div class="swap-arrow" onclick="swapTokens()">⇅</div>
            </div>

            <!-- To Token -->
            <div class="token-box">
                <div class="token-label">To (Estimated)</div>
                <div class="token-row">
                    <input type="number" class="token-input" id="toAmount" placeholder="0.00" readonly>
                    <button class="token-select-btn" onclick="selectToken('to')">
                        <span id="toToken">USDT</span>
                        <span>▼</span>
                    </button>
                </div>
                <div style="font-size: 12px; color: #6b7280; margin-top: 8px;">Balance: <span id="toBalance">0.00</span></div>
            </div>

            <!-- Info -->
            <div class="info-box">
                <div class="info-row">
                    <span>Price Impact</span>
                    <span class="info-value">0.1%</span>
                </div>
                <div class="info-row">
                    <span>Fee (0.1%)</span>
                    <span class="info-value" id="feeDisplay">0.0000</span>
                </div>
                <div style="margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(0,255,163,0.1); font-size: 11px; color: #7a8a94;">
                    <strong style="color: #00ffa3;">💼 Fees distributed:</strong><br>
                    50% → Ethereum | 50% → Bitcoin
                </div>
            </div>

            <!-- Swap Button -->
            <button class="swap-button" onclick="executeSwap()">Swap</button>
        </div>

        <!-- Market Prices -->
        <div class="market-prices">
            <div class="price-card">
                <div class="price-symbol">BTC</div>
                <div class="price-value" id="btcPrice">$45,200</div>
            </div>
            <div class="price-card">
                <div class="price-symbol">ETH</div>
                <div class="price-value" id="ethPrice">$2,800</div>
            </div>
            <div class="price-card">
                <div class="price-symbol">USDT</div>
                <div class="price-value" id="usdtPrice">$1.00</div>
            </div>
            <div class="price-card">
                <div class="price-symbol">USDC</div>
                <div class="price-value" id="usdcPrice">$1.00</div>
            </div>
        </div>
    </div>

    <!-- Connect Wallet Modal -->
    <div id="connectModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeConnectModal()">×</button>
            
            <div class="modal-title">Connect Wallet</div>
            
            <div class="modal-buttons">
                <button class="modal-btn" onclick="connectMetaMask()">🦊 MetaMask</button>
                <button class="modal-btn" onclick="connectTrustWallet()">🛡️ Trust Wallet</button>
                <button class="modal-btn" onclick="connectWalletConnect()">🔗 WalletConnect</button>
                <button class="modal-btn" onclick="connectOKX()">❌ OKX Wallet</button>
                <button class="modal-btn" onclick="connectCoinbase()">⭕ Coinbase Wallet</button>
            </div>
        </div>
    </div>

    <script>
        let currentWallet = null;
        const tokens = ['ETH', 'BTC', 'USDT', 'USDC', 'SOL', 'DOGE', 'XRP', 'LINK', 'ADA', 'AVAX'];
        
        function connectWallet() {
            document.getElementById('connectModal').style.display = 'flex';
        }

        function closeConnectModal() {
            document.getElementById('connectModal').style.display = 'none';
        }

        function connectMetaMask() {
            if (typeof window.ethereum !== 'undefined') {
                window.ethereum.request({ method: 'eth_requestAccounts' })
                    .then(accounts => {
                        currentWallet = accounts[0];
                        updateWalletUI();
                        showMessage(`✅ Connected with MetaMask!`, 'success');
                        closeConnectModal();
                    })
                    .catch(err => showMessage(`❌ Error: ${err.message}`, 'error'));
            } else {
                showMessage('❌ MetaMask not installed', 'error');
            }
        }

        function connectTrustWallet() {
            showMessage('⚠️ Trust Wallet coming soon!', 'error');
        }

        function connectWalletConnect() {
            showMessage('⚠️ WalletConnect coming soon!', 'error');
        }

        function connectOKX() {
            showMessage('⚠️ OKX Wallet coming soon!', 'error');
        }

        function connectCoinbase() {
            showMessage('⚠️ Coinbase Wallet coming soon!', 'error');
        }

        function disconnectWallet() {
            currentWallet = null;
            updateWalletUI();
            showMessage('✅ Disconnected', 'success');
        }

        function updateWalletUI() {
            const connectBtn = document.getElementById('connectBtn');
            const disconnectBtn = document.getElementById('disconnectBtn');
            const statusDot = document.getElementById('statusDot');
            const walletAddress = document.getElementById('walletAddress');

            if (currentWallet) {
                const shortAddress = `${currentWallet.substring(0, 6)}...${currentWallet.substring(currentWallet.length - 4)}`;
                walletAddress.textContent = shortAddress;
                statusDot.classList.add('connected');
                connectBtn.style.display = 'none';
                disconnectBtn.style.display = 'block';
            } else {
                walletAddress.textContent = 'Not Connected';
                statusDot.classList.remove('connected');
                connectBtn.style.display = 'block';
                disconnectBtn.style.display = 'none';
            }
        }

        function selectToken(side) {
            const token = prompt(`Select token: ${tokens.join(', ')}`);
            if (token && tokens.includes(token.toUpperCase())) {
                if (side === 'from') {
                    document.getElementById('fromToken').textContent = token.toUpperCase();
                } else {
                    document.getElementById('toToken').textContent = token.toUpperCase();
                }
                updateFee();
            }
        }

        function swapTokens() {
            const fromToken = document.getElementById('fromToken').textContent;
            const toToken = document.getElementById('toToken').textContent;
            const fromAmount = document.getElementById('fromAmount').value;
            const toAmount = document.getElementById('toAmount').value;

            document.getElementById('fromToken').textContent = toToken;
            document.getElementById('toToken').textContent = fromToken;
            document.getElementById('fromAmount').value = toAmount;
            document.getElementById('toAmount').value = fromAmount;
            updateFee();
        }

        function updateFee() {
            const amount = parseFloat(document.getElementById('fromAmount').value) || 0;
            const fee = amount * 0.001; // 0.1%
            document.getElementById('feeDisplay').textContent = fee.toFixed(6);
        }

        async function executeSwap() {
            if (!currentWallet) {
                showMessage('❌ Connect wallet first', 'error');
                return;
            }

            const fromToken = document.getElementById('fromToken').textContent;
            const toToken = document.getElementById('toToken').textContent;
            const amount = parseFloat(document.getElementById('fromAmount').value);

            if (amount <= 0) {
                showMessage('❌ Enter amount', 'error');
                return;
            }

            showMessage(`⏳ Swapping ${amount} ${fromToken} to ${toToken}...`, 'success');
            
            setTimeout(() => {
                showMessage(`✅ Swap completed! Fee: ${(amount * 0.001).toFixed(6)} ${fromToken}`, 'success');
            }, 2000);
        }

        function showMessage(text, type) {
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 5000);
        }

        // Initialize
        updateWalletUI();

        // Fetch real prices from CoinGecko
        async function fetchPrices() {
            try {
                const ids = 'bitcoin,ethereum,tether,usd-coin';
                const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`);
                const data = await res.json();
                
                if (data.bitcoin) document.getElementById('btcPrice').textContent = `$${data.bitcoin.usd.toLocaleString()}`;
                if (data.ethereum) document.getElementById('ethPrice').textContent = `$${data.ethereum.usd.toLocaleString()}`;
                if (data.tether) document.getElementById('usdtPrice').textContent = `$${data.tether.usd}`;
                if (data['usd-coin']) document.getElementById('usdcPrice').textContent = `$${data['usd-coin'].usd}`;
            } catch (e) {
                console.log('Price fetch error:', e);
            }
        }

        fetchPrices();
        setInterval(fetchPrices, 30000); // Update every 30s
    </script>
</body>
</html>
