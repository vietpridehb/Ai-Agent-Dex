<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent DEX - Next Generation Trading</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: #0a0e1a;
            color: #e8eaed;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(0, 255, 163, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 153, 255, 0.05) 0%, transparent 50%);
        }

        header {
            background: rgba(11, 15, 25, 0.8);
            border-bottom: 1px solid rgba(31, 41, 55, 0.2);
            padding: 16px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 40px;
            font-weight: 800;
            background: linear-gradient(135deg, #00ffa3 0%, #00ff88 50%, #0099ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
            cursor: pointer;
        }

        .nav-menu {
            display: flex;
            gap: 8px;
            flex: 1;
            margin-left: 48px;
        }

        .nav-btn {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid rgba(31, 41, 55, 0.3);
            border-radius: 8px;
            color: #9ca3af;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background: rgba(31, 41, 55, 0.2);
            border-color: rgba(0, 255, 163, 0.3);
            color: #00ffa3;
        }

        .nav-btn.active {
            background: rgba(0, 255, 163, 0.1);
            border-color: #00ffa3;
            color: #00ffa3;
        }

        .header-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .wallet-info {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(31, 41, 55, 0.3);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 12px;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
        }

        .status-dot.connected {
            background: #00ffa3;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .connect-btn, .disconnect-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .connect-btn {
            background: linear-gradient(135deg, #00ffa3, #00ff88);
            color: #000;
        }

        .connect-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 255, 163, 0.3);
        }

        .disconnect-btn {
            background: rgba(248, 113, 113, 0.1);
            color: #f87171;
            border: 1px solid rgba(248, 113, 113, 0.3);
            display: none;
        }

        .disconnect-btn:hover {
            background: rgba(248, 113, 113, 0.2);
        }

        .main {
            max-width: 560px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .swap-container {
            background: rgba(17, 24, 39, 0.5);
            border: 1px solid rgba(31, 41, 55, 0.3);
            border-radius: 24px;
            padding: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }

        .swap-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .swap-title {
            font-size: 20px;
            font-weight: 600;
        }

        .settings-btn {
            width: 40px;
            height: 40px;
            background: rgba(31, 41, 55, 0.3);
            border: 1px solid rgba(31, 41, 55, 0.5);
            border-radius: 10px;
            color: #9ca3af;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .settings-btn:hover {
            background: rgba(31, 41, 55, 0.5);
            color: #00ffa3;
        }

        .token-box {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(31, 41, 55, 0.4);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }

        .token-box:focus-within {
            background: rgba(15, 23, 42, 0.6);
            border-color: rgba(0, 255, 163, 0.3);
            box-shadow: 0 0 20px rgba(0, 255, 163, 0.1);
        }

        .token-label {
            color: #9ca3af;
            font-size: 12px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .token-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .token-select-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(31, 41, 55, 0.5);
            border: 1px solid rgba(31, 41, 55, 0.7);
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
            color: #e8eaed;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .token-select-btn:hover {
            background: rgba(31, 41, 55, 0.7);
            border-color: rgba(0, 255, 163, 0.2);
        }

        select {
            background: transparent;
            border: none;
            color: #e8eaed;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            font-size: 14px;
        }

        select option {
            background: #1f2937;
            color: #e8eaed;
            padding: 8px;
        }

        select option:checked {
            background: #0f172a;
            color: #00ffa3;
        }

        .amount-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #e8eaed;
            font-size: 18px;
            font-weight: 600;
            outline: none;
            text-align: right;
        }

        .amount-input::placeholder {
            color: #4b5563;
        }

        .swap-divider {
            display: flex;
            justify-content: center;
            margin: 12px 0;
        }

        .swap-arrow {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, rgba(0, 255, 163, 0.1), rgba(0, 153, 255, 0.1));
            border: 1px solid rgba(0, 255, 163, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #00ffa3;
            font-size: 20px;
            transition: all 0.3s ease;
        }

        .swap-arrow:hover {
            background: linear-gradient(135deg, rgba(0, 255, 163, 0.2), rgba(0, 153, 255, 0.2));
            transform: rotate(180deg);
        }

        .info-box {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(31, 41, 55, 0.4);
            border-radius: 12px;
            padding: 12px 16px;
            margin: 20px 0;
            font-size: 13px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: #9ca3af;
        }

        .info-row:last-child {
            margin-bottom: 0;
        }

        .info-value {
            color: #00ffa3;
            font-weight: 600;
        }

        .swap-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00ffa3 0%, #00ff88 100%);
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0, 255, 163, 0.25);
            margin-top: 20px;
            letter-spacing: 0.3px;
        }

        .swap-btn:hover:not(:disabled) {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0, 255, 163, 0.4);
        }

        .swap-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .message {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 13px;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: rgba(6, 78, 59, 0.4);
            border: 1px solid rgba(5, 150, 105, 0.4);
            color: #86efac;
        }

        .message.error {
            background: rgba(127, 29, 29, 0.4);
            border: 1px solid rgba(153, 27, 27, 0.4);
            color: #fca5a5;
        }

        @media (max-width: 768px) {
            .nav-menu {
                display: none;
            }
            
            .main {
                margin: 20px auto;
            }

            .swap-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">🤖 AI AGENT DEX</div>
            
            <div class="nav-menu">
                <button class="nav-btn active" onclick="setTab('swap')">Swap</button>
                <button class="nav-btn" onclick="setTab('limit')">Limit</button>
                <button class="nav-btn" onclick="setTab('pool')">Pool</button>
                <button class="nav-btn" onclick="setTab('buy')">Buy</button>
                <button class="nav-btn" onclick="setTab('sell')">Sell</button>
            </div>

            <div class="header-right">
                <div class="wallet-info">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="walletText">Disconnected</span>
                </div>
                <button class="connect-btn" id="connectBtn" onclick="connectWallet()">Connect</button>
                <button class="disconnect-btn" id="disconnectBtn" onclick="disconnectWallet()">Disconnect</button>
            </div>
        </div>
    </header>

    <div class="main">
        <div class="swap-container">
            <div id="message" class="message"></div>

            <div class="swap-header">
                <div class="swap-title">Swap</div>
                <button class="settings-btn">⚙️</button>
            </div>

            <!-- From Token -->
            <div class="token-box">
                <div class="token-label">From</div>
                <div class="token-row">
                    <div class="token-select-btn">
                        <select id="fromToken" onchange="onSwapChange()">
                            <option value="USDT">USDT</option>
                            <option value="ETH">ETH</option>
                            <option value="BTC">BTC</option>
                            <option value="USDC">USDC</option>
                            <option value="SOL">SOL</option>
                            <option value="DOGE">DOGE</option>
                            <option value="XRP">XRP</option>
                            <option value="LINK">LINK</option>
                            <option value="ADA">ADA</option>
                        </select>
                    </div>
                    <input type="number" id="fromAmount" class="amount-input" placeholder="0.0" step="0.0001" oninput="onSwapChange()" min="0">
                </div>
            </div>

            <!-- Swap Arrow -->
            <div class="swap-divider">
                <div class="swap-arrow" onclick="swapTokens()">⇅</div>
            </div>

            <!-- To Token -->
            <div class="token-box">
                <div class="token-label">To</div>
                <div class="token-row">
                    <div class="token-select-btn">
                        <select id="toToken" onchange="onSwapChange()">
                            <option value="ETH">ETH</option>
                            <option value="USDT">USDT</option>
                            <option value="BTC">BTC</option>
                            <option value="USDC">USDC</option>
                            <option value="SOL">SOL</option>
                            <option value="DOGE">DOGE</option>
                            <option value="XRP">XRP</option>
                            <option value="LINK">LINK</option>
                            <option value="ADA">ADA</option>
                        </select>
                    </div>
                    <input type="number" id="toAmount" class="amount-input" placeholder="0.0" readonly>
                </div>
            </div>

            <!-- Info -->
            <div class="info-box">
                <div class="info-row">
                    <span>Price Impact</span>
                    <span class="info-value">0.1%</span>
                </div>
                <div class="info-row">
                    <span>Fee (0.1%)</span>
                    <span class="info-value" id="feeDisplay">0.0000</span>
                </div>
            </div>

            <!-- Swap Button -->
            <button class="swap-btn" id="swapBtn" onclick="executeSwap()" disabled>Connect Wallet to Swap</button>
        </div>


    </div>

    <script>
        let currentWallet = null;

        function setTab(tab) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            showMessage(`${tab.charAt(0).toUpperCase() + tab.slice(1)} feature coming soon! 🚀`, 'error');
        }

        function connectWallet() {
            if (typeof window.ethereum !== 'undefined') {
                window.ethereum.request({ method: 'eth_requestAccounts' })
                    .then(accounts => {
                        currentWallet = accounts[0];
                        updateWalletUI();
                        showMessage(`✅ Connected!`, 'success');
                    })
                    .catch(err => showMessage(`❌ Error: ${err.message}`, 'error'));
            } else {
                showMessage('❌ MetaMask not installed', 'error');
            }
        }

        function disconnectWallet() {
            currentWallet = null;
            updateWalletUI();
            showMessage('✅ Disconnected', 'success');
        }

        function updateWalletUI() {
            if (currentWallet) {
                document.getElementById('statusDot').classList.add('connected');
                document.getElementById('walletText').textContent = `${currentWallet.substring(0, 6)}...`;
                document.getElementById('connectBtn').style.display = 'none';
                document.getElementById('disconnectBtn').style.display = 'block';
            } else {
                document.getElementById('statusDot').classList.remove('connected');
                document.getElementById('walletText').textContent = 'Disconnected';
                document.getElementById('connectBtn').style.display = 'block';
                document.getElementById('disconnectBtn').style.display = 'none';
            }
            updateSwapBtn();
        }

        function swapTokens() {
            const from = document.getElementById('fromToken').value;
            const to = document.getElementById('toToken').value;
            document.getElementById('fromToken').value = to;
            document.getElementById('toToken').value = from;
            onSwapChange();
        }

        function onSwapChange() {
            const amount = parseFloat(document.getElementById('fromAmount').value) || 0;
            if (amount > 0) {
                const fee = (amount * 0.001).toFixed(6);
                const receive = (amount - fee).toFixed(6);
                document.getElementById('toAmount').value = receive;
                document.getElementById('feeDisplay').textContent = fee;
                updateSwapBtn();
            } else {
                document.getElementById('toAmount').value = '';
                document.getElementById('feeDisplay').textContent = '0.0000';
                document.getElementById('swapBtn').disabled = true;
            }
        }

        function updateSwapBtn() {
            const amount = parseFloat(document.getElementById('fromAmount').value) || 0;
            if (currentWallet && amount > 0) {
                document.getElementById('swapBtn').disabled = false;
                document.getElementById('swapBtn').textContent = 'Swap';
            } else {
                document.getElementById('swapBtn').disabled = true;
                if (!currentWallet) {
                    document.getElementById('swapBtn').textContent = 'Connect Wallet to Swap';
                }
            }
        }

        function executeSwap() {
            if (!currentWallet) {
                connectWallet();
                return;
            }

            const amount = parseFloat(document.getElementById('fromAmount').value);
            if (!amount || amount <= 0) return;

            document.getElementById('swapBtn').disabled = true;
            document.getElementById('swapBtn').textContent = 'Swapping...';

            setTimeout(() => {
                showMessage(`✅ Swap successful! Received ${document.getElementById('toAmount').value} ${document.getElementById('toToken').value}`, 'success');
                document.getElementById('fromAmount').value = '';
                onSwapChange();
                document.getElementById('swapBtn').disabled = false;
            }, 800);
        }

        function showMessage(msg, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = msg;
            msgDiv.className = `message show ${type}`;
            setTimeout(() => msgDiv.classList.remove('show'), 4000);
        }

        // No auto-connect on page load - user must click Connect button
    </script>
</body>
</html>
