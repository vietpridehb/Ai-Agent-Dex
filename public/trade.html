<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI DEX - Swap & Trade</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto;
            background: #0a0e27;
            color: #e4e4e7;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            background: #111827;
            border-bottom: 1px solid #1f2937;
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            margin: -20px -20px 30px -20px;
        }

        .header-content {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 40px;
            font-weight: 800;
            background: linear-gradient(135deg, #00ffa3 0%, #00ff88 50%, #0099ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .wallet-info {
            display: flex;
            gap: 15px;
        }

        .wallet-btn {
            background: linear-gradient(135deg, #00ffa3, #00ff88);
            color: #000;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .wallet-status {
            background: #0f172a;
            border: 1px solid #1f2937;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
            color: #9ca3af;
        }

        .disconnect-btn {
            background: #374151;
            color: #f87171;
            padding: 8px 15px;
            border: 1px solid #4b5563;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            display: none;
        }

        .disconnect-btn:hover {
            background: #4b5563;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
        }

        .card h2 {
            color: #00ffa3;
            font-size: 20px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .balance-section {
            background: #0f172a;
            border: 1px solid #1f2937;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .balance-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #1f2937;
        }

        .balance-item:last-child {
            border-bottom: none;
        }

        .balance-token {
            color: #e4e4e7;
            font-weight: 600;
        }

        .balance-amount {
            color: #00ffa3;
            font-weight: 600;
        }

        .swap-form {
            background: #0f172a;
            border-radius: 12px;
            padding: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .token-input-group {
            display: flex;
            gap: 10px;
        }

        .token-select {
            background: #1f2937;
            border: 1px solid #374151;
            padding: 12px 15px;
            border-radius: 8px;
            color: #e4e4e7;
            cursor: pointer;
            min-width: 100px;
            font-weight: 600;
        }

        .amount-input {
            flex: 1;
            background: #1f2937;
            border: 1px solid #374151;
            padding: 12px 15px;
            border-radius: 8px;
            color: #e4e4e7;
            font-size: 16px;
        }

        .swap-arrow {
            text-align: center;
            color: #00ffa3;
            font-size: 20px;
            margin: 10px 0;
        }

        .fee-info {
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
        }

        .fee-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .fee-row:last-child {
            margin-bottom: 0;
            border-top: 1px solid #374151;
            padding-top: 8px;
            margin-top: 8px;
        }

        .fee-label {
            color: #9ca3af;
        }

        .fee-value {
            color: #00ffa3;
            font-weight: 600;
        }

        .swap-button {
            width: 100%;
            background: linear-gradient(135deg, #00ffa3, #00ff88);
            color: #000;
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }

        .swap-button:hover {
            opacity: 0.9;
        }

        .swap-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .message.success {
            background: #064e3b;
            border: 1px solid #059669;
            color: #86efac;
        }

        .message.error {
            background: #7f1d1d;
            border: 1px solid #991b1b;
            color: #fca5a5;
        }

        .message.info {
            background: #1e3a8a;
            border: 1px solid #1e40af;
            color: #93c5fd;
        }

        .tx-history {
            max-height: 400px;
            overflow-y: auto;
        }

        .tx-item {
            background: #0f172a;
            border: 1px solid #1f2937;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .tx-header {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            color: #e4e4e7;
            margin-bottom: 6px;
        }

        .tx-details {
            font-size: 12px;
            color: #9ca3af;
        }

        .tx-fee {
            color: #00ffa3;
            font-weight: 600;
        }

        @media (max-width: 640px) {
            .token-input-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">🤖 AI AGENT DEX</div>
            <div class="wallet-info">
                <div class="wallet-status" id="walletStatus">
                    <span id="statusText">🔴 Disconnected</span>
                </div>
                <button class="wallet-btn" id="connectBtn" onclick="connectWallet()">Connect Wallet</button>
                <button class="disconnect-btn" id="disconnectBtn" onclick="disconnectWallet()">Disconnect</button>
            </div>
        </div>
    </header>

    <div class="container">
        <div id="message"></div>

        <!-- Swap Interface (Always Visible) -->
        <div class="card">
            <h2>🔄 Swap Tokens</h2>
                <div class="swap-form">
                    <div class="form-group">
                        <label class="form-label">From</label>
                        <div class="token-input-group">
                            <select id="fromToken" class="token-select" onchange="calcSwap()">
                                <option value="BTC">BTC</option>
                                <option value="ETH">ETH</option>
                                <option value="USDT" selected>USDT</option>
                                <option value="USDC">USDC</option>
                                <option value="DOGE">DOGE</option>
                                <option value="SOL">SOL</option>
                                <option value="XRP">XRP</option>
                            </select>
                            <input type="number" id="fromAmount" class="amount-input" placeholder="0.0" step="0.0001" oninput="calcSwap()" min="0">
                        </div>
                    </div>

                    <div class="swap-arrow">⇅</div>

                    <div class="form-group">
                        <label class="form-label">To</label>
                        <div class="token-input-group">
                            <select id="toToken" class="token-select" onchange="calcSwap()">
                                <option value="USDT">USDT</option>
                                <option value="BTC">BTC</option>
                                <option value="ETH">ETH</option>
                                <option value="USDC">USDC</option>
                                <option value="DOGE">DOGE</option>
                                <option value="SOL">SOL</option>
                                <option value="XRP">XRP</option>
                            </select>
                            <input type="number" id="toAmount" class="amount-input" placeholder="0.0" readonly>
                        </div>
                    </div>

                    <div class="fee-info">
                        <div class="fee-row">
                            <span class="fee-label">Fee (0.1%)</span>
                            <span class="fee-value" id="feeAmount">0 USDT</span>
                        </div>
                        <div class="fee-row">
                            <span class="fee-label">You receive</span>
                            <span class="fee-value" id="receiveAmount">0 USDT</span>
                        </div>
                    </div>

                    <button class="swap-button" id="swapBtn" onclick="executeSwap()" disabled>Connect Wallet to Swap</button>
                </div>
            </div>
        </div>

        <!-- Wallet Connected Section -->
        <div id="connectedSection" style="display: none;">
            <div class="card">
                <h2>💰 Your Balance</h2>
                <div class="balance-section" id="balanceList">
                    <div style="color: #9ca3af;">Loading balance...</div>
                </div>
            </div>

            <!-- Transaction History -->
            <div class="card">
                <h2>📜 Recent Swaps</h2>
                <div class="tx-history" id="txHistory">
                    <div style="color: #9ca3af; text-align: center; padding: 20px;">No transactions yet</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:3000/api';
        let currentWallet = null;
        let transactions = [];

        // Connect Wallet
        async function connectWallet() {
            if (typeof window.ethereum === 'undefined') {
                showMessage('❌ MetaMask not installed! Get it from metamask.io', 'error');
                return;
            }

            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                currentWallet = accounts[0];
                
                document.getElementById('statusText').innerHTML = `🟢 ${currentWallet.substring(0, 6)}...${currentWallet.substring(38)}`;
                document.getElementById('connectedSection').style.display = 'block';
                updateWalletButtons();
                
                loadBalance();
                loadTransactions();
                showMessage(`✅ Wallet connected: ${currentWallet}`, 'success');
            } catch (err) {
                showMessage(`❌ Connection failed: ${err.message}`, 'error');
            }
        }

        // Load Balance (simulated)
        function loadBalance() {
            const balances = {
                'BTC': 2.5,
                'ETH': 15,
                'USDT': 50000,
                'USDC': 25000,
                'DOGE': 10000,
                'SOL': 500,
                'XRP': 5000
            };

            let html = '';
            for (const [token, amount] of Object.entries(balances)) {
                const usdValue = (amount * Math.random() * 1000).toFixed(2);
                html += `
                    <div class="balance-item">
                        <span class="balance-token">${token}</span>
                        <div style="text-align: right;">
                            <div class="balance-amount">${amount.toFixed(4)}</div>
                            <div style="font-size: 12px; color: #9ca3af;">$${usdValue}</div>
                        </div>
                    </div>
                `;
            }
            document.getElementById('balanceList').innerHTML = html;
        }

        // Calculate Swap
        function calcSwap() {
            const from = document.getElementById('fromAmount').value;
            const to = document.getElementById('toToken').value;

            if (!from || parseFloat(from) <= 0) {
                document.getElementById('toAmount').value = '';
                document.getElementById('feeAmount').textContent = '0 ' + to;
                document.getElementById('receiveAmount').textContent = '0 ' + to;
                document.getElementById('swapBtn').disabled = true;
                return;
            }

            const amount = parseFloat(from);
            const fee = (amount * 0.001).toFixed(6);
            const receive = (amount - fee).toFixed(6);

            document.getElementById('toAmount').value = receive;
            document.getElementById('feeAmount').textContent = fee + ' ' + to;
            document.getElementById('receiveAmount').textContent = receive + ' ' + to;
            
            // Enable button but show it needs wallet
            const swapBtn = document.getElementById('swapBtn');
            if (currentWallet) {
                swapBtn.disabled = false;
                swapBtn.textContent = 'Swap';
            } else {
                swapBtn.disabled = false;
                swapBtn.textContent = 'Connect Wallet to Swap';
            }
        }

        // Execute Swap
        async function executeSwap() {
            const fromToken = document.getElementById('fromToken').value;
            const toToken = document.getElementById('toToken').value;
            const amount = parseFloat(document.getElementById('fromAmount').value);

            if (!amount || amount <= 0) {
                showMessage('❌ Please enter valid amount', 'error');
                return;
            }

            if (!currentWallet) {
                showMessage('❌ Please connect wallet first', 'error');
                connectWallet();
                return;
            }

            document.getElementById('swapBtn').disabled = true;

            try {
                const response = await fetch(`${API}/swap`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        from_token: fromToken,
                        to_token: toToken,
                        amount_in: amount,
                        wallet_address: currentWallet
                    })
                });

                if (!response.ok) throw new Error('Swap failed');
                
                const result = await response.json();

                updateWalletButtons();
                
                // Add to transaction history
                transactions.unshift({
                    from: fromToken,
                    to: toToken,
                    amount: amount,
                    received: result.amount_out,
                    fee: result.fee,
                    time: new Date().toLocaleTimeString()
                });

                showMessage(`✅ Swap executed! Received ${result.amount_out.toFixed(6)} ${toToken}, Fee: ${result.fee.toFixed(6)} ${fromToken}`, 'success');
                
                // Reset form
                document.getElementById('fromAmount').value = '';
                document.getElementById('toAmount').value = '';
                calcSwap();
                loadBalance();
                loadTransactions();

                setTimeout(() => document.getElementById('swapBtn').disabled = false, 1000);
            } catch (err) {
                showMessage(`❌ Error: ${err.message}`, 'error');
                document.getElementById('swapBtn').disabled = false;
            }
        }

        // Load Transaction History
        function loadTransactions() {
            if (transactions.length === 0) {
                document.getElementById('txHistory').innerHTML = '<div style="color: #9ca3af; text-align: center; padding: 20px;">No transactions yet</div>';
                return;
            }

            let html = '';
            for (const tx of transactions.slice(0, 10)) {
                html += `
                    <div class="tx-item">
                        <div class="tx-header">
                            <span>${tx.from} → ${tx.to}</span>
                            <span class="tx-fee">${tx.received.toFixed(6)} ${tx.to}</span>
                        </div>
                        <div class="tx-details">
                            Amount: ${tx.amount.toFixed(4)} ${tx.from} | Fee: ${tx.fee.toFixed(6)} ${tx.from} | ${tx.time}
                        </div>
                    </div>
                `;
            }
            document.getElementById('txHistory').innerHTML = html;
        }

        // Show Message
        function showMessage(msg, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.className = `message ${type}`;
            msgDiv.textContent = msg;
            setTimeout(() => msgDiv.textContent = '', 5000);
        }

        // Disconnect Wallet
        function disconnectWallet() {
            currentWallet = null;
            document.getElementById('statusText').innerHTML = '🔴 Disconnected';
            document.getElementById('connectBtn').style.display = 'inline-block';
            document.getElementById('disconnectBtn').style.display = 'none';
            document.getElementById('connectedSection').style.display = 'none';
            document.getElementById('swapBtn').textContent = 'Connect Wallet to Swap';
            document.getElementById('swapBtn').disabled = false;
            showMessage('✅ Wallet disconnected', 'success');
        }

        // Update button visibility when wallet connects
        function updateWalletButtons() {
            if (currentWallet) {
                document.getElementById('connectBtn').style.display = 'none';
                document.getElementById('disconnectBtn').style.display = 'inline-block';
            } else {
                document.getElementById('connectBtn').style.display = 'inline-block';
                document.getElementById('disconnectBtn').style.display = 'none';
            }
        }

        // Check if already connected
        window.addEventListener('load', async () => {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_accounts' });
                    if (accounts.length > 0) {
                        currentWallet = accounts[0];
                        document.getElementById('statusText').innerHTML = `🟢 ${currentWallet.substring(0, 6)}...${currentWallet.substring(38)}`;
                        document.getElementById('connectedSection').style.display = 'block';
                        updateWalletButtons();
                        loadBalance();
                    }
                } catch (err) {
                    console.log('No wallet connected');
                }
            }
        });
    </script>
</body>
</html>
